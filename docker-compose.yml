version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: linkforge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=linkforge
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linkforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: linkforge_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-compose-development-secret-key-2026
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DATABASE_URL=postgres://postgres:postgres_secure_pass@db:5432/linkforge
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_CREATION_LIMIT=100
      - RATE_LIMIT_CREATION_WINDOW=3600
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: linkforge_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=django-compose-development-secret-key-2026
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres_secure_pass@db:5432/linkforge
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
