databases:
  - name: linkforge-db
    plan: free

services:
  - type: redis
    name: linkforge-redis
    plan: free
    ipAllowList: [] # Access allowed only from services within Render

  - type: web
    name: linkforge-web
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: "/health/"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: linkforge-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: RATE_LIMIT_CREATION_LIMIT
        value: "100"
      - key: RATE_LIMIT_CREATION_WINDOW
        value: "3600"
      - key: SHORT_CODE_LENGTH
        value: "6"

  - type: worker
    name: linkforge-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: linkforge-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
